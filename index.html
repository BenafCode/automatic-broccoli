function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function toRomaji(text) {
  try {
    if (typeof wanakana !== 'undefined') return wanakana.toRomaji(text);
    return '';
  } catch(e) { return ''; }
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP';
  u.rate = 0.85;
  const voices = window.speechSynthesis.getVoices();
  const jpVoice = voices.find(v => v.lang === 'ja-JP') || voices.find(v => v.lang.startsWith('ja'));
  if (jpVoice) u.voice = jpVoice;
  window.speechSynthesis.speak(u);
}

      style={{ background: 'none', border: '1px solid rgba(129,140,248,0.3)', borderRadius: '8px', color: '#818cf8', fontSize: '14px', padding: '4px 9px', cursor: 'pointer', lineHeight: 1, flexShrink: 0, ...style }}
      onClick={e => { e.stopPropagation(); speak(text); }}
      title="Pronounce"
    >🔊</button>
  );
}

function App() {
  const [mode, setMode] = useState("menu");
  const [group, setGroup] = useState(() => {
    try { return localStorage.getItem('vocabStudy_group') || "All"; } catch(e) { return "All"; }
  });
  const [direction, setDirection] = useState(() => {
    try { return localStorage.getItem('vocabStudy_direction') || "jp2en"; } catch(e) { return "jp2en"; }
  });
  const [showRomaji, setShowRomaji] = useState(() => {
    try { return localStorage.getItem('vocabStudy_romaji') === 'true'; } catch(e) { return false; }
  });
  const [persistentKnown, setPersistentKnown] = useState(() => {
    try {
      const s = localStorage.getItem('vocabStudy_knownWords');
      return s ? new Set(JSON.parse(s)) : new Set();
    } catch(e) { return new Set(); }
  });
  const [deck, setDeck] = useState([]);
  const [index, setIndex] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [showSentence, setShowSentence] = useState(false);
  const [known, setKnown] = useState(new Set());
  const [unknown, setUnknown] = useState(new Set());
  const [quizOptions, setQuizOptions] = useState([]);
  const [quizSelected, setQuizSelected] = useState(null);
  const [score, setScore] = useState({ correct: 0, total: 0 });
  const [missedWords, setMissedWords] = useState([]);
  const [listSearch, setListSearch] = useState("");
  const [expandedWord, setExpandedWord] = useState(null);

  useEffect(() => { try { localStorage.setItem('vocabStudy_group', group); } catch(e) {} }, [group]);
  useEffect(() => { try { localStorage.setItem('vocabStudy_direction', direction); } catch(e) {} }, [direction]);
  useEffect(() => { try { localStorage.setItem('vocabStudy_romaji', showRomaji); } catch(e) {} }, [showRomaji]);
  useEffect(() => {
    try { localStorage.setItem('vocabStudy_knownWords', JSON.stringify([...persistentKnown])); } catch(e) {}
  }, [persistentKnown]);

  const filteredVocab = group === "All" ? vocab : vocab.filter(v => v.group === group);
  const masteredCount = filteredVocab.filter(v => persistentKnown.has(`${v.jp}_${direction}`)).length;

  function startFlashcards() {
    setDeck(shuffle(filteredVocab));
    setIndex(0); setFlipped(false); setShowSentence(false);
    setKnown(new Set()); setUnknown(new Set());
    setMode("flashcard");
  }
  function startQuiz() {
    setDeck(shuffle(filteredVocab));
    setIndex(0); setQuizSelected(null);
    setScore({ correct: 0, total: 0 });
    setMissedWords([]);
    setMode("quiz");
  }
  function openList() { setListSearch(""); setExpandedWord(null); setMode("list"); }

  const makeQuizOptions = useCallback((current, allCards) => {
    const correct = direction === "jp2en" ? current.en : current.jp;
    const pool = allCards.filter(v => (direction === "jp2en" ? v.en : v.jp) !== correct);
    const wrongs = shuffle(pool).slice(0, 3).map(v => direction === "jp2en" ? v.en : v.jp);
    return shuffle([correct, ...wrongs]);
  }, [direction]);

  useEffect(() => {
    if (mode === "quiz" && deck.length > 0) {
      setQuizOptions(makeQuizOptions(deck[index], deck));
      setQuizSelected(null);
    }
  }, [mode, deck, index, makeQuizOptions]);

  const currentCard = deck[index];
  const progress = deck.length > 0 ? (index / deck.length) * 100 : 0;

  function handleQuizAnswer(opt) {
    if (quizSelected !== null) return;
    setQuizSelected(opt);
    const correctAns = direction === "jp2en" ? currentCard.en : currentCard.jp;
    const isCorrect = opt === correctAns;
    setScore(s => ({ correct: s.correct + (isCorrect ? 1 : 0), total: s.total + 1 }));
    if (!isCorrect) setMissedWords(m => [...m, currentCard]);
  }

  function nextCard() {
    setFlipped(false); setShowSentence(false); setQuizSelected(null);
    if (index + 1 >= deck.length) setMode("done");
    else setIndex(i => i + 1);
  }

  useEffect(() => {
    function handleKey(e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

      if (mode === 'flashcard' && currentCard) {
        if (e.key === ' ' || e.key === 'Enter') {
          e.preventDefault();
          setFlipped(f => !f);
        } else if (e.key === 'ArrowRight' || e.key === 'l' || e.key === 'L') {
          e.preventDefault();
          const key = `${currentCard.jp}_${direction}`;
          setPersistentKnown(s => new Set(s).add(key));
          setKnown(s => new Set(s).add(index));
          setFlipped(false); setShowSentence(false); setQuizSelected(null);
          if (index + 1 >= deck.length) setMode('done');
          else setIndex(i => i + 1);
        } else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
          e.preventDefault();
          setUnknown(s => new Set(s).add(index));
          setFlipped(false); setShowSentence(false); setQuizSelected(null);
          if (index + 1 >= deck.length) setMode('done');
          else setIndex(i => i + 1);
        }
      }

      if (mode === 'quiz' && currentCard) {
        if (quizSelected === null && ['1','2','3','4'].includes(e.key)) {
          const opt = quizOptions[parseInt(e.key) - 1];
          if (opt !== undefined) {
            const correctAns = direction === 'jp2en' ? currentCard.en : currentCard.jp;
            const isCorrect = opt === correctAns;
            setQuizSelected(opt);
            setScore(s => ({ correct: s.correct + (isCorrect ? 1 : 0), total: s.total + 1 }));
            if (!isCorrect) setMissedWords(m => [...m, currentCard]);
          }
        } else if (quizSelected !== null && (e.key === 'Enter' || e.key === ' ')) {
          e.preventDefault();
          setFlipped(false); setShowSentence(false); setQuizSelected(null);
          if (index + 1 >= deck.length) setMode('done');
          else setIndex(i => i + 1);
        }
      }

      if (mode === 'list' && e.key === 'Escape') {
        setExpandedWord(null);
      }
    }
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [mode, currentCard, quizSelected, quizOptions, index, direction, deck]);

  const S = {
    app: { minHeight:"100vh", background:"linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)", fontFamily:"'Noto Sans JP',sans-serif", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"flex-start", padding:"20px 16px 60px", color:"#e0e7ff" },
    title: { fontSize:"clamp(28px,6vw,48px)", fontWeight:"900", letterSpacing:"-1px", background:"linear-gradient(90deg,#818cf8,#c084fc,#f472b6)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent", marginBottom:"4px", textAlign:"center" },
    subtitle: { fontSize:"12px", color:"#475569", marginBottom:"28px", letterSpacing:"3px", textTransform:"uppercase" },
    card: { background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:"20px", padding:"24px", width:"100%", maxWidth:"480px", boxSizing:"border-box" },
    sectionLabel: { fontSize:"11px", letterSpacing:"2px", textTransform:"uppercase", color:"#475569", marginBottom:"10px" },
    groupGrid: { display:"flex", flexWrap:"wrap", gap:"6px", marginBottom:"20px" },
    groupBtn: a => ({ padding:"5px 12px", borderRadius:"20px", border:a?"1px solid #818cf8":"1px solid rgba(255,255,255,0.1)", background:a?"#818cf8":"rgba(255,255,255,0.04)", color:a?"#fff":"#64748b", fontSize:"12px", cursor:"pointer", fontWeight:a?"700":"400" }),
    modeRow: { display:"flex", gap:"10px", marginBottom:"20px" },
    modeBtn: a => ({ flex:1, padding:"10px 6px", borderRadius:"12px", border:a?"1px solid #c084fc":"1px solid rgba(255,255,255,0.1)", background:a?"rgba(192,132,252,0.15)":"rgba(255,255,255,0.03)", color:a?"#c084fc":"#475569", fontSize:"13px", cursor:"pointer", fontWeight:a?"700":"400" }),
    dirBtn: a => ({ flex:1, padding:"8px", borderRadius:"10px", border:a?"1px solid #f472b6":"1px solid rgba(255,255,255,0.1)", background:a?"rgba(244,114,182,0.15)":"rgba(255,255,255,0.03)", color:a?"#f472b6":"#475569", fontSize:"12px", cursor:"pointer", fontWeight:a?"700":"400" }),
    startBtn: { width:"100%", padding:"14px", borderRadius:"14px", border:"none", background:"linear-gradient(135deg,#818cf8,#c084fc)", color:"#fff", fontSize:"15px", fontWeight:"800", cursor:"pointer", marginTop:"4px" },
    progressBar: { width:"100%", height:"4px", background:"rgba(255,255,255,0.08)", borderRadius:"2px", marginBottom:"20px", overflow:"hidden" },
    progressFill: p => ({ height:"100%", width:`${p}%`, background:"linear-gradient(90deg,#818cf8,#c084fc)", borderRadius:"2px", transition:"width 0.3s ease" }),
    flipCard: { width:"100%", maxWidth:"480px", height:"240px", perspective:"1000px", marginBottom:"16px", cursor:"pointer" },
    flipInner: f => ({ width:"100%", height:"100%", position:"relative", transformStyle:"preserve-3d", transition:"transform 0.5s cubic-bezier(0.4,0,0.2,1)", transform:f?"rotateY(180deg)":"rotateY(0deg)" }),
    flipFace: b => ({ position:"absolute", width:"100%", height:"100%", backfaceVisibility:"hidden", WebkitBackfaceVisibility:"hidden", borderRadius:"20px", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", transform:b?"rotateY(180deg)":"rotateY(0deg)", background:b?"rgba(129,140,248,0.10)":"rgba(255,255,255,0.05)", border:`1px solid ${b?"rgba(129,140,248,0.25)":"rgba(255,255,255,0.1)"}`, padding:"20px", boxSizing:"border-box" }),
    jpText: { fontSize:"clamp(32px,9vw,58px)", fontWeight:"700", color:"#e0e7ff", textAlign:"center", lineHeight:1.2 },
    enText: { fontSize:"clamp(18px,4.5vw,26px)", fontWeight:"600", color:"#c084fc", textAlign:"center" },
    romajiText: { fontSize:"12px", color:"#475569", marginTop:"4px", letterSpacing:"0.5px", textAlign:"center", fontStyle:"italic" },
    tagLabel: { fontSize:"10px", color:"#334155", letterSpacing:"2px", textTransform:"uppercase", marginBottom:"6px" },
    tapHint: { fontSize:"11px", color:"#1e293b", marginTop:"10px" },
    actionRow: { display:"flex", gap:"10px", width:"100%", maxWidth:"480px" },
    actionBtn: c => ({ flex:1, padding:"12px", borderRadius:"14px", border:`1px solid ${c}40`, background:`${c}18`, color:c, fontSize:"14px", fontWeight:"700", cursor:"pointer" }),
    sentenceBox: { width:"100%", maxWidth:"480px", background:"rgba(255,255,255,0.03)", border:"1px solid rgba(129,140,248,0.2)", borderRadius:"14px", padding:"14px 18px", marginBottom:"12px", boxSizing:"border-box" },
    sentenceJp: { fontSize:"16px", color:"#a5b4fc", fontWeight:"500", marginBottom:"4px", lineHeight:1.5 },
    sentenceEn: { fontSize:"13px", color:"#475569", lineHeight:1.5 },
    sentenceToggle: { background:"none", border:"1px solid rgba(129,140,248,0.3)", borderRadius:"10px", color:"#818cf8", fontSize:"12px", padding:"5px 14px", cursor:"pointer", width:"100%", maxWidth:"480px" },
    quizOption: s => ({ width:"100%", maxWidth:"480px", padding:"13px 18px", borderRadius:"14px", marginBottom:"10px", border:s==="correct"?"1px solid #4ade80":s==="wrong"?"1px solid #f87171":"1px solid rgba(255,255,255,0.1)", background:s==="correct"?"rgba(74,222,128,0.12)":s==="wrong"?"rgba(248,113,113,0.12)":"rgba(255,255,255,0.04)", color:s==="correct"?"#4ade80":s==="wrong"?"#f87171":"#cbd5e1", fontSize:"15px", cursor:quizSelected!==null?"default":"pointer", textAlign:"left", fontWeight:s?"700":"400" }),
    backBtn: { background:"none", border:"none", color:"#475569", fontSize:"20px", cursor:"pointer", padding:"0 8px 0 0", lineHeight:1 },
    topRow: { display:"flex", alignItems:"center", gap:"10px", width:"100%", maxWidth:"480px", marginBottom:"16px" },
    counterChip: { display:"inline-flex", alignItems:"center", gap:"6px", background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:"20px", padding:"4px 14px", fontSize:"12px", color:"#64748b" },
    searchBox: { width:"100%", maxWidth:"480px", background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:"12px", padding:"10px 16px", color:"#e0e7ff", fontSize:"14px", outline:"none", marginBottom:"12px", boxSizing:"border-box" },
    listGroupHeader: { fontSize:"11px", letterSpacing:"2px", textTransform:"uppercase", color:"#334155", padding:"14px 0 6px", width:"100%", maxWidth:"480px" },
    listItem: e => ({ width:"100%", maxWidth:"480px", background:e?"rgba(129,140,248,0.08)":"rgba(255,255,255,0.03)", border:e?"1px solid rgba(129,140,248,0.25)":"1px solid rgba(255,255,255,0.06)", borderRadius:"12px", marginBottom:"6px", cursor:"pointer", overflow:"hidden" }),
    listItemHeader: { display:"flex", alignItems:"center", justifyContent:"space-between", padding:"12px 16px" },
    listItemJp: { fontSize:"20px", fontWeight:"700", color:"#e0e7ff" },
    listItemEn: { fontSize:"13px", color:"#64748b", marginTop:"1px" },
    listItemExpanded: { padding:"0 16px 14px", borderTop:"1px solid rgba(255,255,255,0.05)" },
    kbHint: { fontSize:"10px", color:"#1e293b", letterSpacing:"1px", marginTop:"10px", textAlign:"center" },
  };

  function Romaji({ text }) {
    if (!showRomaji) return null;
    const r = toRomaji(text);
    if (!r || r === text) return null;
    return <div style={S.romajiText}>{r}</div>;
  }

  if (mode === "menu") return (
    <div style={S.app}>
      <div style={S.title}>日本語</div>
      <div style={S.subtitle}>Vocabulary Study</div>
      <div style={S.card}>
        <div style={S.sectionLabel}>Topic</div>
        <div style={S.groupGrid}>{ALL_GROUPS.map(g => <button key={g} style={S.groupBtn(group===g)} onClick={()=>setGroup(g)}>{g}</button>)}</div>
        <div style={S.sectionLabel}>Direction</div>
        <div style={{...S.modeRow,marginBottom:"20px"}}>
          <button style={S.dirBtn(direction==="jp2en")} onClick={()=>setDirection("jp2en")}>JP → EN</button>
          <button style={S.dirBtn(direction==="en2jp")} onClick={()=>setDirection("en2jp")}>EN → JP</button>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"20px",flexWrap:"wrap"}}>
          <div style={S.counterChip}>
            📚 {filteredVocab.length} words
            {masteredCount > 0 && <span style={{color:"#4ade80",marginLeft:"4px"}}>· ✓ {masteredCount} mastered</span>}
          </div>
          <button
            style={{...S.dirBtn(showRomaji), flex:"none", padding:"5px 12px", fontSize:"11px", letterSpacing:"1px"}}
            onClick={()=>setShowRomaji(r=>!r)}
            title="Toggle romaji (latin script)"
          >ローマ字 {showRomaji?"ON":"OFF"}</button>
        </div>
        <div style={S.modeRow}>
          <button style={S.modeBtn(false)} onClick={startFlashcards}>🃏 Cards</button>
          <button style={S.modeBtn(false)} onClick={startQuiz}>❓ Quiz</button>
          <button style={S.modeBtn(false)} onClick={openList}>📋 List</button>
        </div>
      </div>
    </div>
  );

  if (mode === "done") {
    const pct = score.total > 0 ? Math.round((score.correct/score.total)*100) : 0;
    const emoji = pct>=80?"🎉":pct>=60?"👍":"💪";
    return (
      <div style={S.app}>
        <div style={S.title}>完了！</div>
        <div style={S.subtitle}>Session Complete</div>
        <div style={{...S.card,textAlign:"center"}}>
          <div style={{fontSize:"56px",marginBottom:"12px"}}>{emoji}</div>
          {score.total > 0 && <div style={{marginBottom:"20px"}}>
            <div style={{fontSize:"38px",fontWeight:"900",color:"#c084fc"}}>{pct}%</div>
            <div style={{color:"#475569",fontSize:"13px"}}>{score.correct} / {score.total} correct</div>
          </div>}
          {score.total === 0 && <div style={{color:"#475569",marginBottom:"20px"}}>All cards reviewed!</div>}
          {missedWords.length > 0 && (
            <div style={{textAlign:"left",marginBottom:"20px"}}>
              <div style={{fontSize:"11px",letterSpacing:"2px",textTransform:"uppercase",color:"#f87171",marginBottom:"10px"}}>
                Missed ({missedWords.length})
              </div>
              <div style={{maxHeight:"220px",overflowY:"auto",display:"flex",flexDirection:"column",gap:"6px",paddingRight:"2px"}}>
                {missedWords.map((w,i) => (
                  <div key={i} style={{background:"rgba(248,113,113,0.07)",border:"1px solid rgba(248,113,113,0.2)",borderRadius:"10px",padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:"8px"}}>
                    <div style={{minWidth:0}}>
                      <div style={{fontSize:"18px",fontWeight:"700",color:"#e0e7ff"}}>{w.jp}</div>
                      {showRomaji && (() => { const r = toRomaji(w.jp); return r && r !== w.jp ? <div style={{fontSize:"10px",color:"#475569",fontStyle:"italic"}}>{r}</div> : null; })()}
                      <div style={{fontSize:"13px",color:"#64748b"}}>{w.en}</div>
                    </div>
                    <SpeakBtn text={w.jp} />
                  </div>
                ))}
              </div>
            </div>
          )}
          <div style={{display:"flex",gap:"10px"}}>
            <button style={S.actionBtn("#818cf8")} onClick={()=>setMode("menu")}>← Menu</button>
            <button style={{...S.startBtn,marginTop:0,flex:1}} onClick={score.total>0?startQuiz:startFlashcards}>Try Again</button>
          </div>
        </div>
      </div>
    );
  }

  if (mode === "list") {
    const sl = listSearch.toLowerCase();
    const listVocab = filteredVocab.filter(v => !listSearch || v.jp.includes(listSearch) || v.en.toLowerCase().includes(sl) || v.sentence.includes(listSearch) || v.sentenceEn.toLowerCase().includes(sl));
    const grouped = {};
    listVocab.forEach(v => { if (!grouped[v.group]) grouped[v.group]=[]; grouped[v.group].push(v); });
    return (
      <div style={S.app}>
        <div style={S.topRow}>
          <button style={S.backBtn} onClick={()=>setMode("menu")}>←</button>
          <div style={{...S.title,marginBottom:0,fontSize:"22px"}}>Vocabulary List</div>
          <div style={{marginLeft:"auto",fontSize:"12px",color:"#334155"}}>{listVocab.length} words</div>
        </div>
        <input style={S.searchBox} placeholder="Search in Japanese or English…" value={listSearch} onChange={e=>setListSearch(e.target.value)} />
        {Object.entries(grouped).map(([grp,words]) => (
          <div key={grp} style={{width:"100%",maxWidth:"480px"}}>
            {!listSearch && <div style={S.listGroupHeader}>{grp} · {words.length}</div>}
            {words.map(v => {
              const expanded = expandedWord === v.jp;
              return (
                <div key={v.jp} style={S.listItem(expanded)} onClick={()=>setExpandedWord(expanded?null:v.jp)}>
                  <div style={S.listItemHeader}>
                    <div style={{minWidth:0,flex:1}}>
                      <div style={S.listItemJp}>{v.jp}</div>
                      {showRomaji && (() => { const r = toRomaji(v.jp); return r && r !== v.jp ? <div style={{fontSize:"10px",color:"#475569",fontStyle:"italic",marginBottom:"1px"}}>{r}</div> : null; })()}
                      <div style={S.listItemEn}>{v.en}</div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:"8px",flexShrink:0,marginLeft:"12px"}}>
                      <SpeakBtn text={v.jp} />
                      <div style={{fontSize:"14px",color:"#334155"}}>{expanded?"▲":"▼"}</div>
                    </div>
                  </div>
                  {expanded && <div style={S.listItemExpanded}>
                    <div style={{...S.tagLabel,marginBottom:"8px"}}>Example sentence</div>
                    <div style={{display:"flex",alignItems:"flex-start",gap:"8px"}}>
                      <div style={{flex:1}}>
                        <div style={S.sentenceJp}>{v.sentence}</div>
                        {showRomaji && (() => { const r = toRomaji(v.sentence); return r && r !== v.sentence ? <div style={{fontSize:"11px",color:"#475569",fontStyle:"italic",marginBottom:"4px"}}>{r}</div> : null; })()}
                        <div style={S.sentenceEn}>{v.sentenceEn}</div>
                      </div>
                      <SpeakBtn text={v.sentence} style={{marginTop:"2px"}} />
                    </div>
                    <div style={{...S.tagLabel,marginTop:"10px",marginBottom:"2px"}}>Group</div>
                    <div style={{fontSize:"12px",color:"#334155"}}>{v.group}</div>
                  </div>}
                </div>
              );
            })}
          </div>
        ))}
      </div>
    );
  }

  if (mode === "flashcard" && currentCard) {
    const front = direction==="jp2en"?currentCard.jp:currentCard.en;
    const back = direction==="jp2en"?currentCard.en:currentCard.jp;
    const frontIsJp = direction==="jp2en";
    const backIsJp = direction==="en2jp";
    return (
      <div style={S.app}>
        <div style={S.topRow}>
          <button style={S.backBtn} onClick={()=>setMode("menu")}>←</button>
          <div style={{flex:1,...S.progressBar,marginBottom:0}}><div style={S.progressFill(progress)}/></div>
          <span style={{fontSize:"12px",color:"#334155",whiteSpace:"nowrap"}}>{index+1}/{deck.length}</span>
        </div>
        <div style={S.flipCard} onClick={()=>setFlipped(f=>!f)}>
          <div style={S.flipInner(flipped)}>
            <div style={S.flipFace(false)}>
              <div style={S.tagLabel}>{frontIsJp?"Japanese":"English"}</div>
              <div style={frontIsJp?S.jpText:S.enText}>{front}</div>
              {frontIsJp && <Romaji text={front} />}
              <div style={S.tapHint}>tap to flip</div>
            </div>
            <div style={S.flipFace(true)}>
              <div style={S.tagLabel}>{backIsJp?"Japanese":"English"}</div>
              <div style={backIsJp?S.jpText:S.enText}>{back}</div>
              {backIsJp && <Romaji text={back} />}
              <div style={{fontSize:"11px",color:"#334155",marginTop:"8px"}}>{currentCard.group}</div>
            </div>
          </div>
        </div>
        <div style={{display:"flex",gap:"8px",width:"100%",maxWidth:"480px",marginBottom:"12px"}}>
          <button style={{...S.sentenceToggle,flex:1}} onClick={()=>setShowSentence(s=>!s)}>
            {showSentence?"Hide example":"Show example sentence"}
          </button>
          <SpeakBtn text={currentCard.jp} />
        </div>
        {showSentence && (
          <div style={S.sentenceBox}>
            <div style={{display:"flex",alignItems:"flex-start",gap:"8px"}}>
              <div style={{flex:1}}>
                <div style={S.sentenceJp}>{currentCard.sentence}</div>
                {showRomaji && (() => { const r = toRomaji(currentCard.sentence); return r && r !== currentCard.sentence ? <div style={{fontSize:"11px",color:"#475569",fontStyle:"italic",marginBottom:"4px"}}>{r}</div> : null; })()}
                <div style={S.sentenceEn}>{currentCard.sentenceEn}</div>
              </div>
              <SpeakBtn text={currentCard.sentence} style={{marginTop:"2px"}} />
            </div>
          </div>
        )}
        <div style={S.actionRow}>
          <button style={S.actionBtn("#f87171")} onClick={()=>{setUnknown(s=>new Set(s).add(index));nextCard();}}>✗ Again</button>
          <button style={S.actionBtn("#4ade80")} onClick={()=>{
            const key=`${currentCard.jp}_${direction}`;
            setPersistentKnown(s=>new Set(s).add(key));
            setKnown(s=>new Set(s).add(index));
            nextCard();
          }}>✓ Got it</button>
        </div>
        <div style={{marginTop:"12px",display:"flex",gap:"16px",fontSize:"12px",color:"#334155"}}>
          <span>✓ {known.size} known</span><span>✗ {unknown.size} to review</span>
        </div>
        <div style={S.kbHint}>Space: flip · → Got it · ← Again</div>
      </div>
    );
  }

  if (mode === "quiz" && currentCard) {
    const question = direction==="jp2en"?currentCard.jp:currentCard.en;
    const correctAns = direction==="jp2en"?currentCard.en:currentCard.jp;
    const questionIsJp = direction==="jp2en";
    const optionsAreJp = direction==="en2jp";
    return (
      <div style={S.app}>
        <div style={S.topRow}>
          <button style={S.backBtn} onClick={()=>setMode("menu")}>←</button>
          <div style={{flex:1,...S.progressBar,marginBottom:0}}><div style={S.progressFill(progress)}/></div>
          <span style={{fontSize:"12px",color:"#334155",whiteSpace:"nowrap"}}>{score.correct}/{score.total}</span>
        </div>
        <div style={{...S.card,marginBottom:"16px",textAlign:"center",width:"100%",maxWidth:"480px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"10px",flexWrap:"wrap"}}>
            <div>
              <div style={S.tagLabel}>{questionIsJp?"What does this mean?":"How do you write this?"}</div>
              <div style={questionIsJp?S.jpText:{...S.enText,fontSize:"clamp(18px,4.5vw,26px)"}}>{question}</div>
              {questionIsJp && <Romaji text={question} />}
            </div>
            <SpeakBtn text={currentCard.jp} />
          </div>
        </div>
        {quizOptions.map((opt,i)=>{
          const isCorrect=opt===correctAns, isSelected=opt===quizSelected;
          const state=quizSelected===null?null:isCorrect?"correct":isSelected?"wrong":null;
          return (
            <button key={opt} style={S.quizOption(state)} onClick={()=>handleQuizAnswer(opt)}>
              <span style={{fontSize:"11px",color:"inherit",opacity:0.5,marginRight:"8px"}}>{i+1}</span>
              {opt}
              {optionsAreJp && showRomaji && (() => { const r = toRomaji(opt); return r && r !== opt ? <div style={{fontSize:"11px",opacity:0.6,marginTop:"2px",fontStyle:"italic"}}>{r}</div> : null; })()}
            </button>
          );
        })}
        {quizSelected !== null && <>
          <div style={{...S.sentenceBox,marginTop:"6px"}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:"8px"}}>
              <div style={{flex:1}}>
                <div style={{...S.tagLabel,marginBottom:"6px"}}>Example sentence</div>
                <div style={S.sentenceJp}>{currentCard.sentence}</div>
                {showRomaji && (() => { const r = toRomaji(currentCard.sentence); return r && r !== currentCard.sentence ? <div style={{fontSize:"11px",color:"#475569",fontStyle:"italic",marginBottom:"4px"}}>{r}</div> : null; })()}
                <div style={S.sentenceEn}>{currentCard.sentenceEn}</div>
              </div>
              <SpeakBtn text={currentCard.sentence} style={{marginTop:"2px"}} />
            </div>
          </div>
          <button style={{...S.startBtn,maxWidth:"480px"}} onClick={nextCard}>Next →</button>
        </>}
        {quizSelected === null && <div style={S.kbHint}>1–4: select answer</div>}
        {quizSelected !== null && <div style={S.kbHint}>Enter: next card</div>}
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
